<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Artwork - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            font-size: 24px;
            opacity: 0.9;
        }
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 300px;
        }
        a {
            display: block;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-align: center;
            transition: all 0.3s ease;
        }
        a:hover {
            border-color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .version {
            font-weight: 600;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Digital Exhibitions</h1>
    <div class="gallery">
        <a href="v1/index.html">
            <span class="version">V1</span> Interactive Spatial Grid
        </a>
        <!-- Future versions (V2, V3) will be appended here -->
    </div>
</body>
</html>
