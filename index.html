<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embodiment - Interactive Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #030303; 
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #loading {
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            font-weight: 300; 
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.7;
            transition: opacity 0.8s ease-out;
        }
    </style>
    <!-- Import Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Loading Scene...</div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 0, 250);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        const hands = [];
        const loader = new GLTFLoader();

        loader.load('scene.glb', (gltf) => {
            document.getElementById('loading').style.display = 'none';
            
            const model = gltf.scene;
            
            // Center the model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            scene.add(model);

            // Restore bounding cube around the entire model
            const boxHelper = new THREE.BoxHelper(model, 0xffffff);
            boxHelper.material.opacity = 0.5;
            boxHelper.material.transparent = true;
            scene.add(boxHelper);

            // Process meshes
            model.traverse((child) => {
                if (child.isMesh && child.name.startsWith('hand')) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        vertexColors: true,
                        metalness: 0.1,
                        roughness: 0.4
                    });
                    
                    // Assign random rotation axis
                    child.userData.axis = new THREE.Vector3(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize();
                    
                    hands.push(child);
                }
            });

        }, undefined, (error) => {
            console.error('Error loading scene.glb:', error);
            document.getElementById('loading').innerText = "Error loading scene.glb. Make sure to run `python3 -m http.server`";
        });

        // The physics interaction logic
        // When user interacts (camera changes), rotate hands in random off-directions
        let isDragging = false;
        
        controls.addEventListener('start', () => { isDragging = true; });
        controls.addEventListener('end', () => { isDragging = false; });
        
        controls.addEventListener('change', () => {
            if (isDragging) {
                // Apply minor rotation to each hand
                hands.forEach(hand => {
                    hand.rotateOnAxis(hand.userData.axis, 0.05);
                });
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
